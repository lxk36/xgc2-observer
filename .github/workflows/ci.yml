name: ci

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  cpp-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install C++ quality tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
                build-essential \
                clang-format \
                clang-tidy \
                cmake \
                cppcheck \
                libeigen3-dev

      - name: Run C++ quality gate
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          ./.xgc2/scripts/check_cpp_quality.sh

  package-compliance:
    needs: cpp-quality
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check whitespace
        run: git -C "${GITHUB_WORKSPACE}" diff --check HEAD

      - name: Package compliance
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          ./.xgc2/scripts/check_package_compliance.sh

  deb-build-and-smoke:
    needs: package-compliance
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deb and run installed smoke test
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            ubuntu:20.04 \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                ca-certificates \
                cmake \
                dpkg-dev \
                fakeroot \
                file \
                git \
                libeigen3-dev
              git config --global --add safe.directory /work
              ./.xgc2/scripts/check_package_compliance.sh
              ./.xgc2/scripts/build_deb.sh
              apt-get install -y ./.ci/debs/libxgc2-observer-dev_*.deb
              ./.xgc2/scripts/smoke_test_installed.sh
            '

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libxgc2-observer-dev-all
          path: .ci/debs/*.deb

      - name: Publish focal APT package
        if: github.event_name != 'pull_request'
        env:
          APT_REPO_HOST: ${{ secrets.APT_REPO_HOST }}
          APT_REPO_PORT: ${{ secrets.APT_REPO_PORT }}
          APT_REPO_USER: ${{ secrets.APT_REPO_USER }}
          APT_REPO_SSH_KEY: ${{ secrets.APT_REPO_SSH_KEY }}
          APT_REPO_KNOWN_HOSTS: ${{ secrets.APT_REPO_KNOWN_HOSTS }}
          APT_REPO_DISTRIBUTION: focal
        run: ./.xgc2/scripts/publish_self_hosted_apt.sh --deb-dir .ci/debs

      - name: Publish jammy APT package
        if: github.event_name != 'pull_request'
        env:
          APT_REPO_HOST: ${{ secrets.APT_REPO_HOST }}
          APT_REPO_PORT: ${{ secrets.APT_REPO_PORT }}
          APT_REPO_USER: ${{ secrets.APT_REPO_USER }}
          APT_REPO_SSH_KEY: ${{ secrets.APT_REPO_SSH_KEY }}
          APT_REPO_KNOWN_HOSTS: ${{ secrets.APT_REPO_KNOWN_HOSTS }}
          APT_REPO_DISTRIBUTION: jammy
        run: ./.xgc2/scripts/publish_self_hosted_apt.sh --deb-dir .ci/debs

      - name: Publish noble APT package
        if: github.event_name != 'pull_request'
        env:
          APT_REPO_HOST: ${{ secrets.APT_REPO_HOST }}
          APT_REPO_PORT: ${{ secrets.APT_REPO_PORT }}
          APT_REPO_USER: ${{ secrets.APT_REPO_USER }}
          APT_REPO_SSH_KEY: ${{ secrets.APT_REPO_SSH_KEY }}
          APT_REPO_KNOWN_HOSTS: ${{ secrets.APT_REPO_KNOWN_HOSTS }}
          APT_REPO_DISTRIBUTION: noble
        run: ./.xgc2/scripts/publish_self_hosted_apt.sh --deb-dir .ci/debs
